name: Atualizar dashboard de taxas

on:
  schedule:
    # Toda segunda-feira às 08:00 horário de Brasília (11:00 UTC)
    - cron: '0 11 * * 1'
  workflow_dispatch:
    # Permite rodar manualmente pelo botão na aba "Actions" do GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # necessário para fazer commit do index.html atualizado

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rodar script de atualização
        run: python update.py

      - name: Commit e push do index.html atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: atualiza dashboard $(date +'%d/%m/%Y')"
          git push
