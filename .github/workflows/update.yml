name: Atualizar dashboard de taxas

on:
  schedule:
    - cron: '0 11 * * 1'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rodar script de atualização
        run: python update.py

      - name: Commit e push dos arquivos atualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data.json
          git diff --cached --quiet || git commit -m "chore: atualiza dashboard $(date +'%d/%m/%Y')"
          git push
